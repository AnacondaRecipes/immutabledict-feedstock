{% set name = "immutabledict" %}
{% set version = "4.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f844a669106cfdc73f47b1a9da003782fb17dc955a54c80972e0d93d1c63c514

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - poetry-core >=2.0.0
  run:
    - python

test:
  imports:
    - immutabledict
  requires:
    - pip
    - pytest
  source_files:
    - tests/
  commands:
    - pip check
    - pytest tests/  # [unix]
    - pytest tests/ -k "not (test_performance)"  # [win]

about:
  home: https://github.com/corenting/immutabledict
  dev_url: https://github.com/corenting/immutabledict
  doc_url: https://immutabledict.corenting.fr
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A fork of frozendict, an immutable wrapper around dictionaries.
  description:
    - An immutable wrapper around dictionaries.
    - immutabledict implements the complete mapping interface and can be used as a
    - drop-in replacement for dictionaries where immutability is desired.

extra:
  recipe-maintainers:
    - althonos
